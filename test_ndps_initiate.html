<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test NDPS Payment Initiation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Test NDPS Payment Initiation</h1>
    
    <form id="paymentForm">
        <div class="form-group">
            <label>Order ID:</label>
            <input type="number" id="orderId" value="1" required>
        </div>
        
        <div class="form-group">
            <label>Customer Email:</label>
            <input type="email" id="customerEmail" value="test@example.com" required>
        </div>
        
        <div class="form-group">
            <label>Customer Mobile:</label>
            <input type="tel" id="customerMobile" value="9876543210" required>
        </div>
        
        <div class="form-group">
            <label>Amount:</label>
            <input type="number" id="amount" value="100.00" step="0.01" required>
        </div>
        
        <button type="submit">Initiate Payment</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Processing...';
            resultDiv.className = 'result';
            
            const payload = {
                orderId: parseInt(document.getElementById('orderId').value),
                customerEmail: document.getElementById('customerEmail').value,
                customerMobile: document.getElementById('customerMobile').value,
                amount: parseFloat(document.getElementById('amount').value)
            };
            
            console.log('Sending payload:', payload);
            
            try {
                const response = await fetch('http://localhost:4000/api/ndps/initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = 'SUCCESS:\n' + JSON.stringify(data, null, 2);
                    
                    // If we got payment data, we could submit to gateway
                    if (data.gatewayUrl && data.formData) {
                        console.log('Gateway URL:', data.gatewayUrl);
                        console.log('Form Data:', data.formData);
                    }
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = 'ERROR:\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'NETWORK ERROR:\n' + error.message;
            }
        });
    </script>
</body>
</html>
